<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Configurator Pro</title>
  <link rel="stylesheet" href="styles/main.css?v=20260319" />
</head>
<body>

<div class="app">
  <!-- ── Top bar ──────────────────────────────────────── -->
  <div class="topbar">
    <button class="btn btn-back-home" id="btnHome" style="display:none" title="Back to category list">← Home</button>
    <div class="tabs" id="tabs"></div>
    <button class="btn primary" id="btnNewTab" style="display:none">+ New Tab</button>
    <button class="btn" id="btnSave" style="display:none" title="Save checkpoint (Ctrl+S)">💾 Save</button>
    <button class="btn btn-publish" id="btnPublish" title="Publish changes to GitHub (live for everyone)">☁ Publish</button>
    <button class="btn"            id="btnHistory" title="View last 10 checkpoints &amp; revert">🕐 History</button>
    <button class="btn" id="btnExportInventor" style="display:none" title="Export for Autodesk Inventor iProperties">🔩 Export Inventor</button>
  </div>

  <!-- ── Home screen (category card grid) ─────────────── -->
  <div id="homeScreen" class="home-screen" style="display:none"></div>

  <!-- ── Three-panel workspace ─────────────────────────── -->
  <div class="main" id="mainContainer" style="display:none">

    <!-- Left: context selectors -->
    <div class="panel" id="leftPanel">
      <div class="panel-header">Context</div>
      <div class="panel-body" id="contextBody"></div>
    </div>

    <div class="resizer" id="resizer1"></div>

    <!-- Centre: output grid -->
    <div class="panel" id="centerPanel" style="flex:1">
      <div class="panel-header"><div id="productName">---</div></div>
      <div id="columnFilterBar" class="column-filter-bar" style="display:none"></div>
      <div class="panel-body" style="padding:0">
        <div id="loadingIndicator" class="loading-indicator" style="display:none">Loading configuration…</div>
        <table id="mainGrid">
          <thead><tr id="gridHead"></tr></thead>
          <tbody id="gridBody"></tbody>
        </table>
      </div>
    </div>

    <div class="resizer" id="resizer2"></div>

    <!-- Right: tabbed panel (Parts / Rules / Config) -->
    <div class="panel" id="rightPanel">
      <div style="display:flex;border-bottom:1px solid var(--stroke)">
        <button class="btn rtab active" data-rtab="parts"  style="flex:1;border:0;border-radius:0;padding:10px">Parts</button>
        <button class="btn rtab"        data-rtab="rules"  style="flex:1;border:0;border-radius:0;padding:10px">Rules</button>
        <button class="btn rtab"        data-rtab="config" style="flex:1;border:0;border-radius:0;padding:10px">Config</button>
      </div>
      <div class="panel-body">
        <div id="tab-parts"></div>
        <div id="tab-rules"  style="display:none"></div>
        <div id="tab-config" style="display:none"></div>
      </div>
    </div>

  </div><!-- /.main -->
</div><!-- /.app -->

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  SCRIPT LOAD ORDER — DO NOT REORDER                     ║
  ║                                                          ║
  ║  1. state.js       — State object + accessors           ║
  ║  2. engine.js      — Logic that reads State             ║
  ║  3. renderers.js   — DOM writers                        ║
  ║  4. actions.js     — Mutations + re-render              ║
  ║  5. ui.js          — Dialogs, inline edit               ║
  ║  6. io.js          — File I/O, wires toolbar            ║
  ║  7. github.js      — GitHub publish & history           ║
  ║  8. categories.js  — Category nav, lazy load, home      ║
  ╚══════════════════════════════════════════════════════════╝
-->
<script src="js/state.js?v=20260319"></script>
<script src="js/engine.js?v=20260319"></script>
<script src="js/renderers.js?v=20260319"></script>
<script src="js/actions.js?v=20260319"></script>
<script src="js/ui.js?v=20260319"></script>
<script src="js/io.js?v=20260319"></script>
<script src="js/github.js?v=20260319"></script>
<script src="js/categories.js?v=20260319"></script>

<script>
  /* Startup — load categories config, show home screen */
  initCategories();
</script>

</body>
</html>
